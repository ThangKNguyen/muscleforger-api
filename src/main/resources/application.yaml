spring:
  application:
    name: muscleforger-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/muscleforger}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000
  refresh-expiration: 604800000

rapidapi:
  key: ${RAPIDAPI_KEY}
  exercisedb:
    host: exercisedb.p.rapidapi.com
    base-url: https://exercisedb.p.rapidapi.com
  youtube:
    host: youtube-search-and-download.p.rapidapi.com
    base-url: https://youtube-search-and-download.p.rapidapi.com
